<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFF Task</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>
<body>
    <header>
        <img class="header-img" src="image/logo.svg" alt="logo">
    </header>

    <section>
        <div class="container-header">
            <div class="items"><img id="globe" src="image/globe (2).svg" alt="globe icon">
                <p class="item-text">онлайн-курс</p>
            </div>
            <div class="items"><img id="clock" src="image/clock.svg" alt="clock icon">
                <p class="item-text">18 часов</p>
            </div>
            <div class="items"><img id="calendar" src="image/calendar_2 (1).svg" alt="calendar icon">
                <p class="item-text">8 сентября</p>
            </div>
        </div>

        <div class="container-main">
            <div class="text-group">
                <h1 class="title">Как смотреть кино</h1>
                <p class="description">За 8 занятий станем активными зрителями
                    и разберёмся в кинопроцессе</p>
            </div>
            <div class="rejisor">
                <img src="image/rejisor.svg" alt="rejisor">
            </div>
        </div>

        <div class="container-footer">
            <p class="container-3-text">Зритель для меня<br>
                не потребитель моей продукции,<br> не судья, а соучастник<br> творчества, соавтор. </p>
            <span class="container-3-author">Андрей Тарковский</span>    
        </div>

    </section>
    
</body>
</html>
